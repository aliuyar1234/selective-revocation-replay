model_name: qwen3_5_27b_instruct
model_id: qwen3.5-27b-instruct-quantized
local_model_path: /path/to/Qwen3.5-27B
backend: local_qwen
runtime_loader: qwen3_5_text
temperature: 0
top_p: 1.0
max_tokens: 512
json_mode: true
chat_template_kwargs:
  enable_thinking: false
notes:
  - Replace local_model_path with a local checkpoint path, or override it via LOCAL_QWEN_MODEL_PATH.
  - This remains the higher-capacity optional target model.
  - Local Qwen support uses vendored Hugging Face packages from vendor/ and loads the checkpoint through the text-only Qwen3_5ForCausalLM path.
